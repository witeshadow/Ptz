<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <title>PTZ Preset Control — AVIPAS — TEST123</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f16;
      --surf:    #161923;
      --surf2:   #1e2233;
      --border:  #2a2f45;
      --accent:  #3b82f6;
      --success: #10b981;
      --error:   #ef4444;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --label:   #94a3b8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────── */
    header {
      background: var(--surf);
      border-bottom: 1px solid var(--border);
      padding: 6px 16px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .brand-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-icon svg { width: 15px; height: 15px; fill: #fff; }
    .brand-text h1  { font-size: 0.9rem; font-weight: 600; color: #fff; }
    .brand-text p   { font-size: 0.65rem; color: var(--muted); margin-top: 1px; }

    .header-pills {
      margin-left: auto;
      display: flex;
      align-items: center;
    }

    #status {
      display: flex; align-items: center;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.75rem;
      color: var(--label);
      min-width: 140px;
      transition: border-color 0.3s, color 0.3s;
    }
    #status.success { border-color: var(--success); color: var(--success); }
    #status.error   { border-color: var(--error);   color: var(--error);   }
    #status.busy    { border-color: var(--accent);  color: var(--accent);  }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0; transition: background 0.3s;
    }
    #status.success .status-dot { background: var(--success); }
    #status.error   .status-dot { background: var(--error);   }
    #status.busy    .status-dot { background: var(--accent); animation: blink .8s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    #atem-pill {
      display: flex; align-items: center;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 11px;
      font-size: 0.75rem;
      color: var(--muted);
      transition: border-color 0.3s, color 0.3s;
      white-space: nowrap;
    }
    #atem-pill.connected { border-color: var(--success); color: var(--success); }
    #atem-pill.connected .atem-dot { background: var(--success); }
    #atem-pill.disabled  { opacity: 0.4; }

    #fullscreen-btn {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #fullscreen-btn:hover { border-color: var(--accent); color: var(--accent); }

    #live-mode-btn {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background-color 0.2s;
      user-select: none;
    }
    #live-mode-btn:hover { border-color: var(--accent); color: var(--accent); }
    #live-mode-btn.live {
      background: var(--success);
      border-color: var(--success);
      color: white;
      font-weight: 700;
    }
    #live-mode-btn.live:hover { background: var(--success); opacity: 0.9; }

    .atem-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
    }

    /* ── Camera tabs ─────────────────────────────────── */
    #cam-tabs {
      background: var(--surf);
      border-bottom: 2px solid var(--border);
      padding: 0 20px;
      display: flex;
      flex-shrink: 0;
    }

    .cam-tab {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      padding: 11px 22px;
      color: var(--muted);
      font-size: 0.88rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      user-select: none;
      display: flex; align-items: center;
    }
    .cam-tab:hover { color: var(--text); }
    .cam-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .cam-tab.live { background: rgba(34, 197, 94, 0.1); }
    .cam-tab.edit { background: rgba(107, 114, 128, 0.05); }

    .cam-badge {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .cam-badge.live { background: var(--success); color: white; }
    .cam-badge.preview { background: var(--accent); color: white; }
    .cam-badge.edit { background: var(--muted); color: var(--surf); }

    .cam-num {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: inherit; opacity: .6;
    }

    .cam-name-wrap { position: relative; }

    .cam-name-input {
      font-size: 0.88rem; font-weight: 600;
      background: var(--surf2); border: 1px solid var(--accent);
      border-radius: 4px; color: var(--text);
      padding: 1px 6px; outline: none; width: 110px;
    }

    /* ── Settings bar ────────────────────────────────── */
    .field { display: flex; flex-direction: column; }

    .field label {
      font-size: 0.65rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .07em; color: var(--muted);
    }

    .field input, .field select {
      background: var(--surf2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      padding: 6px 9px; font-size: 0.85rem; outline: none;
      transition: border-color .2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }

    #f-ip         { width: 158px; }
    #f-port       { width: 86px; }
    #f-visca      { width: 66px; }
    #f-atem-input { width: 66px; }
    #f-webcam     { width: 190px; }
    #f-usb-device { width: 190px; }
    #f-stream-url { width: 220px; }
    #f-dwell      { width: 68px; }

    .sep {
      width: 1px; height: 36px; background: var(--border);
      align-self: flex-end; margin: 0 2px;
    }

    .atem-toggle-wrap {
      display: flex; align-items: center;
      cursor: pointer; user-select: none;
    }
    .atem-toggle-wrap input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); }
    .atem-toggle-wrap span { font-size: 0.82rem; color: var(--label); }

    #f-atem-ip { width: 158px; }

    #webcam-preview {
      display: none;
      flex-shrink: 0;
      flex-direction: column;
    }
    #webcam-preview.visible { display: flex; }

    #preview-frame {
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    #webcam-video, #stream-iframe {
      display: block; width: 160px; height: 90px;
      object-fit: cover; background: #000;
    }
    #stream-iframe { border: none; }


    /* ── Main ────────────────────────────────────────── */
    main {
      flex: 1;
      padding: 20px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Preset grid ─────────────────────────────────── */
    #preset-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .preset-btn {
      position: relative;
      overflow: hidden;
      background: var(--surf);
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
      user-select: none;
      touch-action: manipulation;
    }
    /* 16:9 fallback for Safari < 15 (no aspect-ratio support) */
    .preset-btn::before {
      content: '';
      display: block;
      padding-top: 56.25%;
    }
    @supports (aspect-ratio: 1) {
      .preset-btn { aspect-ratio: 16/9; }
      .preset-btn::before { display: none; }
    }
    .preset-btn:not(.edit-mode):not(.state-busy):hover { border-color: var(--accent); }
    .preset-btn:not(.edit-mode):not(.state-busy):active { transform: scale(.97); }

    .preset-num {
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; color: var(--border);
      transition: color .15s;
      pointer-events: none;
    }
    .preset-btn:not(.edit-mode):not(.state-busy):hover .preset-num { color: var(--accent); }
    .preset-btn.has-image .preset-num { display: none; }

    .preset-snapshot {
      position: absolute; top: 0; right: 0; bottom: 0; left: 0;
      width: 100%; height: 100%; object-fit: cover;
      display: none;
    }
    .preset-btn.has-image .preset-snapshot { display: block; }

    .preset-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(0deg, rgba(0,0,0,.75) 0%, transparent 100%);
      padding: 14px 8px 6px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .preset-btn:not(.has-image) .preset-overlay {
      background: rgba(0,0,0,.28);
      padding: 4px 8px 5px;
    }

    .ov-num {
      font-size: .95rem; font-weight: 700;
      color: rgba(255,255,255,.55); flex-shrink: 0;
      text-shadow: 0 1px 3px rgba(0,0,0,.9);
    }
    .ov-name {
      font-size: .8rem; color: rgba(255,255,255,.9);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      text-align: right; flex: 1;
      text-shadow: 0 1px 3px rgba(0,0,0,.9);
    }

    .preset-clear {
      position: absolute; top: 5px; right: 5px;
      width: 20px; height: 20px;
      background: rgba(0,0,0,.65); border: 1px solid rgba(255,255,255,.25);
      border-radius: 50%; color: #fff; font-size: .75rem; line-height: 1;
      cursor: pointer; display: none;
      align-items: center; justify-content: center;
      transition: background .15s;
      z-index: 2;
    }
    .preset-btn.has-image:hover .preset-clear { display: flex; }
    .preset-clear:hover { background: var(--error); border-color: var(--error); }

    .name-input {
      font-size: .7rem; background: var(--surf2);
      border: 1px solid var(--accent); border-radius: 3px;
      color: var(--text); padding: 1px 5px;
      text-align: right; outline: none; width: 100%;
    }

    .preset-btn.state-busy  { border-color: var(--accent); pointer-events: none; }
    .preset-btn.state-ok    { border-color: var(--success); }
    .preset-btn.state-fail  { border-color: var(--error); }

    .preset-btn.edit-mode { cursor: default; }
    .preset-btn.edit-mode:hover { border-color: var(--border); }
    .preset-btn.edit-mode:hover .preset-num { color: var(--border); }

    /* ── Toolbar ─────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      margin-top: 16px;
    }

    .btn-primary {
      background: var(--accent); border: none; border-radius: 7px;
      color: #fff; padding: 8px 18px; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-primary.cancel { background: var(--error); }

    .btn-ghost {
      background: transparent; border: 1px solid var(--border);
      border-radius: 7px; color: var(--muted);
      padding: 7px 16px; font-size: .82rem; cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-ghost:hover, .btn-ghost.active { border-color: var(--accent); color: var(--accent); }

    /* ── Scan bar ────────────────────────────────────── */
    #scan-bar {
      display: none;
      align-items: center;
      margin-left: auto;
      flex: 1; max-width: 380px;
    }
    #scan-bar.visible { display: flex; }

    #scan-track {
      flex: 1; height: 4px; background: var(--border);
      border-radius: 2px; overflow: hidden;
    }
    #scan-fill {
      height: 100%; background: var(--accent); width: 0%;
      transition: width .35s;
    }
    #scan-label { font-size: .75rem; color: var(--muted); white-space: nowrap; }

    /* ── Footer ──────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--surf);
      padding: 10px 20px;
      font-size: .68rem; color: var(--border);
      text-align: center; flex-shrink: 0;
    }

    /* ── Fill-window layout ──────────────────────────────── */
    body.fill-mode { height: 100vh; overflow: hidden; }
    body.fill-mode main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    body.fill-mode #preset-grid { flex: 1; align-content: start; justify-content: center; }
    body.fill-mode #toolbar { flex-shrink: 0; }

    /* ── Grid-settings FAB ───────────────────────────────── */
    #grid-settings-fab {
      position: fixed; bottom: 18px; right: 18px; z-index: 200;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
      transition: opacity .2s, transform .2s;
    }
    #grid-settings-fab:hover { opacity: .85; transform: scale(1.07); }
    #grid-settings-fab svg { width: 20px; height: 20px; fill: #fff; }

    /* ── Grid-settings panel ─────────────────────────────── */
    #grid-settings-panel {
      position: fixed; bottom: 18px; right: 18px; z-index: 199;
      width: 90%; max-width: 800px; max-height: 80vh;
      background: var(--surf); border: 1px solid var(--border);
      border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.5);
      display: none; flex-direction: column;
    }
    #grid-settings-panel.open { display: flex; }
    .gsp-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      font-size: .9rem; font-weight: 600; color: var(--text);
      flex-shrink: 0;
    }
    #gsp-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; line-height: 1; }
    #gsp-close:hover { color: var(--text); }
    .gsp-body {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
      padding: 16px; overflow-y: auto; flex: 1;
    }
    .gsp-column { display: flex; flex-direction: column; }
    .gsp-section-title { font-size: .75rem; font-weight: 600; color: var(--label); text-transform: uppercase; letter-spacing: 0.5px; }
    .gsp-body .field { display: flex; flex-direction: column; }
    .gsp-body .field label { font-size: .75rem; color: var(--label); font-weight: 500; }
    .gsp-body .field input, .gsp-body .field select { background: var(--surf2); border: 1px solid var(--border); color: var(--text); padding: 6px 8px; border-radius: 4px; font-size: .8rem; }
    .gsp-body .atem-toggle-wrap { display: flex; align-items: center; }
    .gsp-body .atem-toggle-wrap input { width: 16px; height: 16px; }
    .gsp-body .atem-toggle-wrap span { font-size: .8rem; color: var(--text); }
    #webcam-preview-panel { border-top: 1px solid var(--border); padding: 12px; }
    #preview-frame { width: 100%; max-height: 150px; border-radius: 6px; overflow: hidden; }
    #preview-frame video, #preview-frame iframe { width: 100%; height: 100%; object-fit: cover; }

    /* ── ATEM debug panel display ───────────────────────── */
    #atem-debug {
      display: none;
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 198;
      max-width: min(92vw, 640px);
      font-size: 0.72rem; color: var(--muted); line-height: 1.7;
      background: var(--surf2);
      border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,.35);
    }
    #atem-debug.visible { display: block; }
    #atem-debug span { color: var(--label); font-weight: 600; }

    /* ── Flex gap fallbacks (Safari < 14.5) ─────────────── */
    header > * + *          { margin-left: 12px; }
    .header-pills > * + *   { margin-left: 8px; }
    #status > * + *         { margin-left: 7px; }
    #atem-pill > * + *      { margin-left: 6px; }
    #cam-tabs > * + *       { margin-left: 2px; }
    .cam-tab > * + *        { margin-left: 8px; }
    .atem-toggle-wrap > * + * { margin-left: 8px; }
    .preset-overlay > * + * { margin-left: 4px; }
    #toolbar > * + *        { margin-left: 10px; }
    #scan-bar > * + *       { margin-left: 12px; }
    .field > * + *          { margin-top: 4px; }
    #webcam-preview > * + * { margin-top: 4px; }
    .gsp-column > * + *     { margin-top: 12px; }
  </style>
</head>
<body>

<header>
  <div class="brand-icon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M23 7l-7 5 7 5V7z"/>
      <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
    </svg>
  </div>
  <div class="brand-text">
    <h1>PTZ Preset Control</h1>
    <p>AVIPAS Camera &nbsp;&middot;&nbsp; VISCA over IP</p>
  </div>
  <div class="header-pills">
    <button id="fullscreen-btn" title="Toggle fullscreen">&#x26F6;</button>
    <button id="live-mode-btn" class="live" title="Toggle Live/Edit mode">Live</button>
    <div id="atem-pill" class="disabled">
      <div class="atem-dot"></div>
      <span>ATEM</span>
    </div>
    <div id="status" role="status" aria-live="polite">
      <div class="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
  </div>
</header>

<div id="cam-tabs"><!-- rendered by JS --></div>

<main>
  <div id="preset-grid"><!-- rendered by JS --></div>
  <div id="toolbar">
    <button class="btn-primary" id="btn-scan">Scan All Presets</button>
    <button class="btn-ghost"    id="btn-edit">Edit Labels</button>
    <div id="scan-bar">
      <div id="scan-track"><div id="scan-fill"></div></div>
      <span id="scan-label"></span>
    </div>
  </div>
</main>

<footer>Tap a preset to recall it &nbsp;&middot;&nbsp;
  Turn on Edit Labels to rename presets &nbsp;&middot;&nbsp; Double-click a camera tab to rename it</footer>

<div id="grid-settings-panel">
  <div class="gsp-header">
    <span>Settings</span>
    <button id="gsp-close">&#x2715;</button>
  </div>
  <div class="gsp-body">
    <!-- Camera Settings (Col 1) -->
    <div class="gsp-column">
      <div class="gsp-section-title">Camera</div>
      <div class="field">
        <label for="f-ip">IP</label>
        <input id="f-ip" type="text" placeholder="192.168.1.100" autocomplete="off" spellcheck="false" />
      </div>
      <div class="field">
        <label for="f-port">Port</label>
        <input id="f-port" type="number" value="52381" min="1" max="65535" />
      </div>
      <div class="field">
        <label for="f-visca">VISCA Addr</label>
        <select id="f-visca">
          <option>1</option><option>2</option><option>3</option>
          <option>4</option><option>5</option><option>6</option><option>7</option>
        </select>
      </div>
      <div class="field">
        <label for="f-atem-input">ATEM Input</label>
        <select id="f-atem-input">
          <option value="1">1</option><option value="2">2</option>
          <option value="3">3</option><option value="4">4</option>
          <option value="5">5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option>
        </select>
      </div>
    </div>

    <!-- Preview & Dwell (Col 2) -->
    <div class="gsp-column">
      <div class="gsp-section-title">Preview</div>
      <div class="field">
        <label for="f-usb-device">USB Device</label>
        <select id="f-usb-device"><option value="">— none —</option></select>
      </div>
      <div class="field">
        <label for="f-stream-url">VDO.ninja / URL</label>
        <input id="f-stream-url" type="text" placeholder="https://vdo.ninja/?view=…" autocomplete="off" spellcheck="false" />
      </div>
      <div class="field">
        <label for="f-webcam">Browser Preview</label>
        <select id="f-webcam"><option value="">— select —</option></select>
      </div>
      <div class="field">
        <label for="f-dwell">Dwell (s)</label>
        <input id="f-dwell" type="number" value="3" min="1" max="60" />
      </div>
      <label class="atem-toggle-wrap">
        <input id="f-atem-enabled" type="checkbox" />
        <span>Follow ATEM</span>
      </label>
      <div class="field">
        <label for="f-atem-ip">ATEM IP</label>
        <input id="f-atem-ip" type="text" placeholder="192.168.1.200" autocomplete="off" spellcheck="false" />
      </div>
      <label class="atem-toggle-wrap">
        <input id="gsp-atem-debug" type="checkbox" />
        <span>Show Debug Overlay</span>
      </label>
      <div id="atem-debug">
        CAM <span id="dbg-cam">—</span> &nbsp;
        PGM <span id="dbg-pgm">—</span> &nbsp;
        PVW <span id="dbg-pvw">—</span> &nbsp;
        PAN <span id="dbg-pan">—</span> &nbsp;
        TILT <span id="dbg-tilt">—</span> &nbsp;
        VISCA <span id="dbg-visca">—</span> &nbsp;
        <span id="dbg-inputs"></span>
      </div>
    </div>

    <!-- Grid Layout (Col 3) -->
    <div class="gsp-column">
      <div class="gsp-section-title">Grid Layout</div>
      <div class="field">
        <label for="gsp-start">Start</label>
        <input id="gsp-start" type="number" min="0" max="254" />
      </div>
      <div class="field">
        <label for="gsp-end">End</label>
        <input id="gsp-end" type="number" min="1" max="255" />
      </div>
      <div class="field">
        <label for="gsp-cols">Columns</label>
        <input id="gsp-cols" type="number" min="1" max="16" />
      </div>
      <div class="field">
        <label for="gsp-rows">Rows</label>
        <input id="gsp-rows" type="number" min="1" max="16" />
      </div>
      <label class="atem-toggle-wrap">
        <input id="gsp-fill" type="checkbox" />
        <span>Fill Window</span>
      </label>
      <div class="field" id="live-preference-field" style="display:none;">
        <label>Live Mode Follows</label>
        <select id="f-atem-follows">
          <option value="preview">Preview</option>
          <option value="program">Program</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Camera Management -->
  <div style="border-top: 1px solid var(--border); padding: 12px;">
    <div class="gsp-section-title">Camera Management</div>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
      <label class="atem-toggle-wrap" style="margin: 4px 0;">
        <input id="f-cam-0-enabled" type="checkbox" class="cam-enable-cb" data-idx="0" />
        <span>Camera 1</span>
      </label>
      <label class="atem-toggle-wrap" style="margin: 4px 0;">
        <input id="f-cam-1-enabled" type="checkbox" class="cam-enable-cb" data-idx="1" />
        <span>Camera 2</span>
      </label>
      <label class="atem-toggle-wrap" style="margin: 4px 0;">
        <input id="f-cam-2-enabled" type="checkbox" class="cam-enable-cb" data-idx="2" />
        <span>Camera 3</span>
      </label>
    </div>
  </div>

  <!-- Webcam preview at bottom -->
  <div id="webcam-preview" style="border-top: 1px solid var(--border); padding: 12px;">
    <div id="preview-frame">
      <video id="webcam-video" autoplay muted playsinline></video>
      <iframe id="stream-iframe" src="" allow="camera; microphone; autoplay; fullscreen" style="display:none"></iframe>
    </div>
  </div>
</div>
<button id="grid-settings-fab" title="Grid Settings">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61
             l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54
             c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54
             c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87
             c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94
             l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22
             l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84
             c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96
             c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6
             c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
  </svg>
</button>

<script>
(function () {
  'use strict';

  // ── State ──────────────────────────────────────────────────────────────────
  const DEF_CAMERAS = [
    { name: 'Camera 1', ip: '', port: 52381, viscaAddr: 1, atemInput: 1, streamUrl: '', usbDevice: '', enabled: true },
    { name: 'Camera 2', ip: '', port: 52381, viscaAddr: 1, atemInput: 2, streamUrl: '', usbDevice: '', enabled: true },
    { name: 'Camera 3', ip: '', port: 52381, viscaAddr: 1, atemInput: 3, streamUrl: '', usbDevice: '', enabled: true },
  ];

  let state = {
    activeCam: 0,
    cameras: DEF_CAMERAS.map(c => ({ ...c })),
    labels: {},
    dwellMs: 3000,
    atem: { ip: '', enabled: false },
    showAtemDebug: false,
    liveMode: true,
    atemFollows: 'preview',
    previewSource: null,
    programSource: null,
    presetStart: 0,
    presetEnd: 11,
    gridCols: 4,
    gridRows: 3,
    fillWindow: false,
  };

  // webcamDeviceId is browser-specific; stays in localStorage
  function getWebcamDeviceId()    { return localStorage.getItem('ptz-webcam-device') || ''; }
  function setWebcamDeviceId(id)  { localStorage.setItem('ptz-webcam-device', id); }

  // ── Server persistence ────────────────────────────────────────────────────
  let saveTimer = null;

  async function loadSettings() {
    try {
      const res = await fetch('/settings');
      if (res.ok) {
        const s = await res.json();
        if (Array.isArray(s.cameras) && s.cameras.length) {
          state.cameras  = s.cameras.map(c => ({ ...DEF_CAMERAS[0], ...c }));
        }
        if (s.activeCam != null) state.activeCam = +s.activeCam;
        if (s.labels)   state.labels  = s.labels;
        if (s.dwellMs)  state.dwellMs = +s.dwellMs;
        if (s.atem)     state.atem    = { ip: '', enabled: false, ...s.atem };
        if (s.presetStart != null) state.presetStart = +s.presetStart;
        if (s.presetEnd   != null) state.presetEnd   = +s.presetEnd;
        if (s.gridCols    != null) state.gridCols    = +s.gridCols;
        if (s.gridRows    != null) state.gridRows    = +s.gridRows;
        if (s.fillWindow  != null) state.fillWindow  = !!s.fillWindow;
        if (s.liveMode      != null) state.liveMode      = !!s.liveMode;
        if (s.showAtemDebug != null) state.showAtemDebug = !!s.showAtemDebug;
        if (s.atemFollows)           state.atemFollows   = s.atemFollows;
      }
    } catch (_) {}
  }

  function schedSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(pushSettings, 400);
  }

  async function pushSettings() {
    try {
      await fetch('/settings', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(state),
      });
    } catch (_) {}
  }

  // ── Status pill ────────────────────────────────────────────────────────────
  const elStatus     = document.getElementById('status');
  const elStatusText = document.getElementById('status-text');
  let statusTimer    = null;

  function setStatus(type, msg, autoClear = true) {
    clearTimeout(statusTimer);
    elStatus.className = type;
    elStatusText.textContent = msg;
    if (autoClear && (type === 'success' || type === 'error')) {
      statusTimer = setTimeout(() => {
        elStatus.className = '';
        elStatusText.textContent = 'Ready';
      }, 4000);
    }
  }

  // ── ATEM pill ──────────────────────────────────────────────────────────────
  const elAtemPill = document.getElementById('atem-pill');

  function updateAtemPill(connected) {
    if (!state.atem.enabled) {
      elAtemPill.className = 'disabled';
      return;
    }
    elAtemPill.className = connected ? 'connected' : '';
  }

  // ── ATEM debug overlay ─────────────────────────────────────────────────────
  const elAtemDebug = document.getElementById('atem-debug');
  const elDbgCam    = document.getElementById('dbg-cam');
  const elDbgPgm    = document.getElementById('dbg-pgm');
  const elDbgPvw    = document.getElementById('dbg-pvw');
  const elDbgPan    = document.getElementById('dbg-pan');
  const elDbgTilt   = document.getElementById('dbg-tilt');
  const elDbgVisca  = document.getElementById('dbg-visca');
  const elDbgInputs = document.getElementById('dbg-inputs');
  let debugPositionTimer = null;
  let debugPositionRequestId = 0;

  function setDebugPosition(pan = '—', tilt = '—', visca = '—') {
    elDbgPan.textContent = pan;
    elDbgTilt.textContent = tilt;
    elDbgVisca.textContent = visca;
  }

  async function fetchDebugPosition() {
    if (!state.showAtemDebug) return;
    const camIdx = state.activeCam;
    const cam = state.cameras[camIdx];
    if (!cam?.ip) {
      setDebugPosition('—', '—', 'NO IP');
      return;
    }

    const requestId = ++debugPositionRequestId;
    try {
      const res = await fetch(`/api/position/${camIdx}`);
      const data = await res.json().catch(() => ({}));
      if (requestId !== debugPositionRequestId) return;
      if (!res.ok || !data.ok) {
        const msg = (data.error || `${res.status}`).slice(0, 48);
        setDebugPosition('ERR', 'ERR', msg);
        return;
      }
      const visca = data.responder && data.expected_responder &&
        data.responder !== data.expected_responder
        ? `${data.responder} != ${data.expected_responder}`
        : 'OK';
      setDebugPosition(data.pan_hex || '—', data.tilt_hex || '—', visca);
    } catch (_) {
      if (requestId === debugPositionRequestId) setDebugPosition('ERR', 'ERR', 'FETCH ERR');
    }
  }

  function scheduleDebugPositionPolling() {
    if (debugPositionTimer) {
      clearInterval(debugPositionTimer);
      debugPositionTimer = null;
    }
    debugPositionRequestId += 1;
    if (!state.showAtemDebug) {
      setDebugPosition();
      return;
    }
    fetchDebugPosition();
    debugPositionTimer = setInterval(fetchDebugPosition, 1000);
  }

  function updateAtemDebug() {
    if (!state.showAtemDebug) {
      elAtemDebug.classList.remove('visible');
      scheduleDebugPositionPolling();
      return;
    }
    elAtemDebug.classList.add('visible');
    elDbgCam.textContent = `CAM ${state.activeCam + 1}`;
    elDbgPgm.textContent = state.programSource != null ? state.programSource : '—';
    elDbgPvw.textContent = state.previewSource != null ? state.previewSource : '—';
    elDbgInputs.textContent = state.cameras
      .filter(c => c.enabled !== false)
      .map((c, i) => `CAM${i + 1}=${c.atemInput}`)
      .join(' ');
    scheduleDebugPositionPolling();
  }

  // ── Camera tabs ────────────────────────────────────────────────────────────
  const elTabs = document.getElementById('cam-tabs');

  function renderTabs() {
    elTabs.innerHTML = '';
    state.cameras.forEach((cam, idx) => {
      // Skip disabled cameras
      if (!cam.enabled) return;

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'cam-tab' + (idx === state.activeCam ? ' active' : '');
      btn.dataset.idx = idx;

      const numEl = document.createElement('span');
      numEl.className = 'cam-num';
      numEl.textContent = `CAM ${idx + 1}`;

      const nameWrap = document.createElement('span');
      nameWrap.className = 'cam-name-wrap';

      const nameEl = document.createElement('span');
      nameEl.className = 'cam-name';
      nameEl.textContent = cam.name;

      // Add badge for mode/ATEM indicator
      let badgeText = '', badgeClass = '';

      const onProgram = state.programSource !== null &&
        state.cameras.findIndex(c => +c.atemInput === +state.programSource) === idx;
      const onPreview = state.previewSource !== null &&
        state.cameras.findIndex(c => +c.atemInput === +state.previewSource) === idx;

      if (onProgram) {
        badgeText = 'LIVE';
        badgeClass = 'live';
        btn.classList.add('live');
      } else if (onPreview) {
        badgeText = 'PREVIEW';
        badgeClass = 'preview';
        btn.classList.add('preview');
      }

      if (!badgeText && idx === state.activeCam && !state.liveMode) {
        badgeText = 'EDIT';
        badgeClass = 'edit';
        btn.classList.add('edit');
      }

      if (badgeText) {
        const badge = document.createElement('span');
        badge.className = 'cam-badge ' + badgeClass;
        badge.textContent = badgeText;
        nameWrap.appendChild(badge);
      }

      nameWrap.appendChild(nameEl);
      btn.appendChild(numEl);
      btn.appendChild(nameWrap);

      btn.addEventListener('click', () => {
        if (idx !== state.activeCam) switchCamera(idx);
      });

      btn.addEventListener('dblclick', (e) => {
        e.preventDefault();
        openTabNameEditor(idx, nameEl, nameWrap);
      });

      elTabs.appendChild(btn);
    });
  }

  function switchCamera(idx) {
    saveCameraSettings();
    state.activeCam = idx;
    schedSave();
    loadCameraSettings();
    renderTabs();
    refreshGridForActiveCamera();
    applyGridLayout();
    updateAtemDebug();
  }

  function openTabNameEditor(idx, nameEl, nameWrap) {
    if (nameWrap.querySelector('input')) return;
    const prev = state.cameras[idx].name;
    const inp  = document.createElement('input');
    inp.className = 'cam-name-input';
    inp.value     = prev;
    inp.maxLength = 20;
    inp.addEventListener('click', e => e.stopPropagation());

    nameEl.style.display = 'none';
    nameWrap.appendChild(inp);
    inp.focus(); inp.select();

    function commit() {
      const v = inp.value.trim() || prev;
      state.cameras[idx].name = v;
      schedSave();
      nameEl.textContent    = v;
      nameEl.style.display  = '';
      nameWrap.removeChild(inp);
    }

    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter')  inp.blur();
      if (e.key === 'Escape') { inp.value = prev; inp.blur(); }
    });
  }

  // ── Settings bar ───────────────────────────────────────────────────────────
  const elIp        = document.getElementById('f-ip');
  const elPort      = document.getElementById('f-port');
  const elVisca     = document.getElementById('f-visca');
  const elAtemInput = document.getElementById('f-atem-input');
  const elDwell     = document.getElementById('f-dwell');

  function loadCameraSettings() {
    const cam = state.cameras[state.activeCam];
    elIp.value        = cam.ip;
    elPort.value      = cam.port;
    elVisca.value     = cam.viscaAddr;
    elAtemInput.value = cam.atemInput || 1;
    elDwell.value     = state.dwellMs / 1000;
    elAtemEnabled.checked = !!state.atem.enabled;
    elAtemIp.value        = state.atem.ip || '';
    updateAtemPill(false);
    elUsbDevice.value = cam.usbDevice || '';
    const url = cam.streamUrl || '';
    elStreamUrl.value = url;
    applyStreamUrl(url);
  }

  function saveCameraSettings() {
    const cam      = state.cameras[state.activeCam];
    cam.ip         = elIp.value.trim();
    cam.port       = parseInt(elPort.value, 10) || 52381;
    cam.viscaAddr  = parseInt(elVisca.value, 10) || 1;
    cam.atemInput  = parseInt(elAtemInput.value, 10) || 1;
    cam.usbDevice  = elUsbDevice.value;
    cam.streamUrl  = elStreamUrl.value.trim();
    state.dwellMs  = (parseInt(elDwell.value, 10) || 3) * 1000;
    state.atem.enabled = elAtemEnabled.checked;
    state.atem.ip      = elAtemIp.value.trim();
  }

  [elIp, elPort, elVisca, elAtemInput, elDwell].forEach(el =>
    el.addEventListener('change', () => { saveCameraSettings(); schedSave(); })
  );

  // ── ATEM settings ──────────────────────────────────────────────────────────
  const elAtemEnabled = document.getElementById('f-atem-enabled');
  const elAtemIp      = document.getElementById('f-atem-ip');

  elAtemEnabled.addEventListener('change', () => {
    saveCameraSettings();
    schedSave();
    updateAtemPill(false);
    updateAtemDebug();
    // Show/hide Live preference field based on ATEM enabled state
    if (elLivePreferenceField) {
      elLivePreferenceField.style.display = state.atem.enabled ? 'block' : 'none';
    }
  });
  elAtemIp.addEventListener('change', () => { saveCameraSettings(); schedSave(); });

  // ── SSE ────────────────────────────────────────────────────────────────────
  (function initSSE() {
    const es = new EventSource('/events');
    es.onmessage = (e) => {
      console.log('[SSE]', e.data);
      try {
        const ev = JSON.parse(e.data);
        if (ev.type === 'atem') {
          updateAtemPill(ev.connected);
          // Apply initial preview/program sources sent with the connection event
          if (ev.preview != null && ev.preview !== 0) state.previewSource = ev.preview;
          if (ev.program != null && ev.program !== 0) state.programSource = ev.program;
          renderTabs();
          updateAtemDebug();
        } else if (ev.type === 'preview') {
          state.previewSource = ev.source;
          renderTabs();
          updateAtemDebug();
          // Auto-switch in Live mode if following preview
          if (state.liveMode && state.atem.enabled && state.atemFollows === 'preview') {
            const idx = state.cameras.findIndex(c => +c.atemInput === +ev.source);
            if (idx >= 0 && idx !== state.activeCam) switchCamera(idx);
          }
        } else if (ev.type === 'program') {
          state.programSource = ev.source;
          renderTabs();
          updateAtemDebug();
          // Auto-switch in Live mode if following program
          if (state.liveMode && state.atem.enabled && state.atemFollows === 'program') {
            const idx = state.cameras.findIndex(c => +c.atemInput === +ev.source);
            if (idx >= 0 && idx !== state.activeCam) switchCamera(idx);
          }
        }
      } catch (_) {}
    };
    es.onerror = () => {};  // browser auto-reconnects
  })();

  // ── Live/Edit mode toggle ──────────────────────────────────────────────────
  function updateToolbarVisibility() {
    const btnScanEl = document.getElementById('btn-scan');
    if (btnScanEl) btnScanEl.style.display = state.liveMode ? 'none' : '';
  }

  const elLiveBtn = document.getElementById('live-mode-btn');
  if (elLiveBtn) {
    elLiveBtn.addEventListener('click', () => {
      state.liveMode = !state.liveMode;
      elLiveBtn.textContent = state.liveMode ? 'Live' : 'Edit';
      elLiveBtn.classList.toggle('live', state.liveMode);
      schedSave();
      updateToolbarVisibility();
    });
  }

  // ── Fullscreen toggle ─────────────────────────────────────────────────────
  const elFullscreenBtn = document.getElementById('fullscreen-btn');
  if (elFullscreenBtn) {
    elFullscreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    });
    document.addEventListener('fullscreenchange', () => {
      elFullscreenBtn.title = document.fullscreenElement ? 'Exit fullscreen' : 'Toggle fullscreen';
      elFullscreenBtn.innerHTML = document.fullscreenElement ? '&#x26F6;' : '&#x26F6;';
    });
  }

  // ── Grid-settings panel ────────────────────────────────────────────────────
  const elGspPanel = document.getElementById('grid-settings-panel');
  const elGspFab   = document.getElementById('grid-settings-fab');
  const elGspClose = document.getElementById('gsp-close');
  const elGspStart = document.getElementById('gsp-start');
  const elGspEnd   = document.getElementById('gsp-end');
  const elGspCols  = document.getElementById('gsp-cols');
  const elGspRows  = document.getElementById('gsp-rows');
  const elGspFill  = document.getElementById('gsp-fill');

  if (elGspFab && elGspPanel) {
    elGspFab.addEventListener('click', () => {
      console.log('FAB clicked!');
      elGspPanel.classList.toggle('open');
    });
  }
  if (elGspClose && elGspPanel) {
    elGspClose.addEventListener('click', () => elGspPanel.classList.remove('open'));
  }

  const elGspAtemDebug = document.getElementById('gsp-atem-debug');
  if (elGspAtemDebug) {
    elGspAtemDebug.addEventListener('change', () => {
      state.showAtemDebug = elGspAtemDebug.checked;
      schedSave();
      updateAtemDebug();
    });
  }

  function loadGridSettings() {
    elGspStart.value  = state.presetStart ?? 0;
    elGspEnd.value    = state.presetEnd   ?? 11;
    elGspCols.value   = state.gridCols    ?? 4;
    elGspRows.value   = state.gridRows    ?? 3;
    elGspFill.checked = !!state.fillWindow;
    if (elGspAtemDebug) elGspAtemDebug.checked = !!state.showAtemDebug;
    applyGridLayout();
  }

  function saveGridSettings() {
    state.presetStart = Math.max(0, parseInt(elGspStart.value, 10) || 0);
    state.presetEnd   = Math.max(state.presetStart + 1, parseInt(elGspEnd.value, 10) || 11);
    state.gridCols    = Math.max(1, parseInt(elGspCols.value, 10) || 4);
    state.gridRows    = Math.max(1, parseInt(elGspRows.value, 10) || 3);
    state.fillWindow  = elGspFill.checked;
    schedSave();
    renderGrid();
    applyGridLayout();
  }

  [elGspStart, elGspEnd, elGspCols, elGspRows].forEach(el =>
    el.addEventListener('change', saveGridSettings)
  );
  elGspFill.addEventListener('change', saveGridSettings);

  // ── Camera Management & Live Mode Preferences ──────────────────────────────
  const elAtemFollows = document.getElementById('f-atem-follows');
  const elLivePreferenceField = document.getElementById('live-preference-field');
  const camEnableCbs = document.querySelectorAll('.cam-enable-cb');

  function loadCameraManagement() {
    // Load camera enabled states
    camEnableCbs.forEach(cb => {
      const idx = parseInt(cb.dataset.idx, 10);
      cb.checked = !!state.cameras[idx]?.enabled;
    });
    // Load Live preference
    if (elAtemFollows) {
      elAtemFollows.value = state.atemFollows || 'preview';
      // Show preference only if ATEM is enabled
      if (elLivePreferenceField) {
        elLivePreferenceField.style.display = state.atem.enabled ? 'block' : 'none';
      }
    }
  }

  function saveCameraManagement() {
    // Save camera enabled states
    camEnableCbs.forEach(cb => {
      const idx = parseInt(cb.dataset.idx, 10);
      if (state.cameras[idx]) {
        state.cameras[idx].enabled = cb.checked;
      }
    });
    // Save Live preference
    if (elAtemFollows) {
      state.atemFollows = elAtemFollows.value;
    }
    renderTabs();  // Refresh tabs to show/hide disabled cameras
    schedSave();
  }

  // Attach listeners
  camEnableCbs.forEach(cb => {
    cb.addEventListener('change', saveCameraManagement);
  });
  if (elAtemFollows) {
    elAtemFollows.addEventListener('change', saveCameraManagement);
  }

  // ── Webcam / stream source ────────────────────────────────────────────────
  const elWebcam      = document.getElementById('f-webcam');
  const elUsbDevice   = document.getElementById('f-usb-device');
  const elStreamUrl   = document.getElementById('f-stream-url');
  const elPreview     = document.getElementById('webcam-preview');
  const elVideo       = document.getElementById('webcam-video');
  const elIframe      = document.getElementById('stream-iframe');
  const captureCanvas = document.createElement('canvas');
  const captureCtx    = captureCanvas.getContext('2d');

  let videoStream = null;
  let sourceMode  = 'webcam'; // 'webcam' | 'url'

  function _setMode(mode) {
    sourceMode = mode;
    elVideo.style.display  = mode === 'webcam' ? 'block' : 'none';
    elIframe.style.display = mode === 'url'    ? 'block' : 'none';
    elPreview.classList.add('visible');
  }

  async function enumerateWebcams() {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const videos  = devices.filter(d => d.kind === 'videoinput');
      const prev    = elWebcam.value;
      while (elWebcam.options.length > 1) elWebcam.remove(1);
      videos.forEach((dev, i) => {
        const opt = document.createElement('option');
        opt.value       = dev.deviceId;
        opt.textContent = dev.label || `Camera ${i + 1}`;
        elWebcam.appendChild(opt);
      });
      if (prev) elWebcam.value = prev;
    } catch (_) {}
  }

  async function startWebcam(deviceId) {
    try {
      if (videoStream) videoStream.getTracks().forEach(t => t.stop());
      videoStream = await navigator.mediaDevices.getUserMedia({
        video: deviceId ? { deviceId: { exact: deviceId } } : true,
        audio: false,
      });
      elVideo.srcObject = videoStream;
      _setMode('webcam');
      setWebcamDeviceId(deviceId);
      await enumerateWebcams();
    } catch (e) {
      setStatus('error', `Webcam: ${e.message}`);
    }
  }

  function applyStreamUrl(url) {
    if (url) {
      elIframe.src = url;
      _setMode('url');
    } else if (videoStream) {
      _setMode('webcam');
    } else {
      elIframe.src = '';
      elPreview.classList.remove('visible');
    }
  }

  elWebcam.addEventListener('change', () => {
    const id = elWebcam.value;
    if (id) {
      elStreamUrl.value = '';
      state.cameras[state.activeCam].streamUrl = '';
      schedSave();
      startWebcam(id);
    }
  });

  elStreamUrl.addEventListener('change', () => {
    const url = elStreamUrl.value.trim();
    state.cameras[state.activeCam].streamUrl = url;
    schedSave();
    if (url) elWebcam.value = '';
    applyStreamUrl(url);
  });

  elUsbDevice.addEventListener('change', () => {
    state.cameras[state.activeCam].usbDevice = elUsbDevice.value;
    schedSave();
  });

  // captureFrame priority: USB device (ffmpeg) > stream URL (playwright) > browser webcam
  async function captureFrame(cam, preset) {
    const camera = state.cameras[cam];
    const usb = camera.usbDevice || '';
    const url = camera.streamUrl || '';

    if (usb || url) {
      const body = usb ? { usbDevice: usb } : { url };
      const res  = await fetch(`/api/capture/${cam}/${preset}`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { setStatus('error', data.error || 'Capture failed'); return false; }
      return true;
    }

    // browser webcam fallback
    if (!videoStream || !elVideo.videoWidth) return false;
    const maxW = 640, maxH = 360;
    let sw = elVideo.videoWidth, sh = elVideo.videoHeight;
    if (sw > maxW) { sh = Math.round(sh * maxW / sw); sw = maxW; }
    if (sh > maxH) { sw = Math.round(sw * maxH / sh); sh = maxH; }
    captureCanvas.width  = sw;
    captureCanvas.height = sh;
    captureCtx.drawImage(elVideo, 0, 0, sw, sh);
    const blob = await new Promise(r => captureCanvas.toBlob(r, 'image/jpeg', 0.65));
    await fetch(`/api/image/${cam}/${preset}`, {
      method:  'POST',
      headers: { 'Content-Type': 'image/jpeg' },
      body:    blob,
    });
    return true;
  }

  // ── Preset grid ────────────────────────────────────────────────────────────
  const elGrid = document.getElementById('preset-grid');
  let editMode = false;
  const imageVersions = Object.create(null);

  function presetKey(cam, preset) {
    return `${cam}:${preset}`;
  }

  function bumpImageVersion(cam, preset) {
    const key = presetKey(cam, preset);
    imageVersions[key] = (imageVersions[key] || 0) + 1;
  }

  function presetNumbers() {
    const nums = [];
    for (let n = state.presetStart; n <= state.presetEnd; n++) nums.push(n);
    return nums;
  }

  function renderGrid() {
    elGrid.innerHTML = '';
    presetNumbers().forEach(n => elGrid.appendChild(buildPresetBtn(n)));
    elGrid.style.gridTemplateColumns = `repeat(${state.gridCols}, 1fr)`;
  }

  function refreshGridForActiveCamera() {
    const nums = presetNumbers();
    if (elGrid.children.length !== nums.length) {
      renderGrid();
      return;
    }
    nums.forEach(n => refreshPresetBtn(n, state.activeCam));
  }

  function updateFillGridMetrics() {
    const elMain = document.querySelector('main');
    const elToolbar = document.getElementById('toolbar');
    if (!state.fillWindow || !elMain || !elToolbar) {
      elGrid.style.justifyContent = '';
      elGrid.style.alignContent = '';
      elGrid.style.gridTemplateColumns = `repeat(${state.gridCols}, 1fr)`;
      elGrid.style.gridTemplateRows = '';
      return;
    }

    const cols = Math.max(1, state.gridCols || 1);
    const rows = Math.max(1, state.gridRows || 1);
    const gridStyles = getComputedStyle(elGrid);
    const gap = parseFloat(gridStyles.gap || gridStyles.rowGap || '0') || 0;
    const toolbarStyles = getComputedStyle(elToolbar);
    const toolbarMarginTop = parseFloat(toolbarStyles.marginTop || '0') || 0;

    const availableWidth = Math.max(0, elMain.clientWidth);
    const availableHeight = Math.max(
      0,
      elMain.clientHeight - elToolbar.offsetHeight - toolbarMarginTop
    );
    const widthFromColumns = (availableWidth - gap * (cols - 1)) / cols;
    const widthFromRows = ((availableHeight - gap * (rows - 1)) / rows) * (16 / 9);
    const tileWidth = Math.floor(Math.max(0, Math.min(widthFromColumns, widthFromRows)));

    if (!Number.isFinite(tileWidth) || tileWidth <= 0) {
      elGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      elGrid.style.gridTemplateRows = '';
      return;
    }

    const tileHeight = Math.round(tileWidth * 9 / 16);
    elGrid.style.justifyContent = 'center';
    elGrid.style.alignContent = 'start';
    elGrid.style.gridTemplateColumns = `repeat(${cols}, ${tileWidth}px)`;
    elGrid.style.gridTemplateRows = `repeat(${rows}, ${tileHeight}px)`;
  }

  function applyGridLayout() {
    const elMain = document.querySelector('main');
    if (state.fillWindow) {
      elMain.style.maxWidth = '';
      elMain.style.padding  = '8px';
      document.body.classList.add('fill-mode');
    } else {
      elMain.style.maxWidth = '860px';
      elMain.style.padding  = '20px';
      document.body.classList.remove('fill-mode');
    }
    updateFillGridMetrics();
  }

  function imgUrl(cam, preset) {
    return `/api/image/${cam}/${preset}?v=${imageVersions[presetKey(cam, preset)] || 0}`;
  }

  function refreshPresetImage(btn, cam, preset) {
    const imgEl = btn.querySelector('.preset-snapshot');
    if (!imgEl) return;

    const nextUrl = imgUrl(cam, preset);
    if (btn.dataset.currentImageUrl === nextUrl) return;

    const requestId = String((parseInt(btn.dataset.imageRequestId || '0', 10) || 0) + 1);
    btn.dataset.imageRequestId = requestId;

    const preload = new Image();
    preload.addEventListener('load', () => {
      if (btn.dataset.imageRequestId !== requestId) return;
      imgEl.src = nextUrl;
      btn.dataset.currentImageUrl = nextUrl;
      btn.classList.add('has-image');
    });
    preload.addEventListener('error', () => {
      if (btn.dataset.imageRequestId !== requestId) return;
      btn.dataset.currentImageUrl = '';
      imgEl.removeAttribute('src');
      btn.classList.remove('has-image');
    });
    preload.src = nextUrl;
  }

  function refreshPresetBtn(n, cam) {
    const btn = elGrid.querySelector(`[data-preset="${n}"]`);
    if (!btn) return;

    btn.dataset.displayCam = cam;
    const ovName = btn.querySelector('.ov-name');
    if (ovName && !ovName.querySelector('input')) {
      ovName.textContent = state.labels[presetKey(cam, n)] || '';
    }
    refreshPresetImage(btn, cam, n);
  }

  function buildPresetBtn(n) {
    const cam = state.activeCam;
    const lbl = state.labels[presetKey(cam, n)] || '';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className  = 'preset-btn' + (editMode ? ' edit-mode' : '');
    btn.dataset.preset = n;
    btn.dataset.displayCam = cam;

    const numEl = document.createElement('div');
    numEl.className   = 'preset-num';
    numEl.textContent = n;
    btn.appendChild(numEl);

    const imgEl = document.createElement('img');
    imgEl.className = 'preset-snapshot';
    btn.appendChild(imgEl);

    const ov = document.createElement('div');
    ov.className = 'preset-overlay';

    const ovNum  = document.createElement('span');
    ovNum.className   = 'ov-num';
    ovNum.textContent = n;

    const ovName = document.createElement('span');
    ovName.className   = 'ov-name';
    ovName.textContent = lbl;
    ovName.dataset.forLabel = n;

    ov.appendChild(ovNum);
    ov.appendChild(ovName);
    btn.appendChild(ov);

    const clearBtn = document.createElement('button');
    clearBtn.className   = 'preset-clear';
    clearBtn.type        = 'button';
    clearBtn.title       = 'Clear snapshot';
    clearBtn.textContent = '×';
    clearBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const activeCam = state.activeCam;
      const res = await fetch(`/api/image/${activeCam}/${n}`, { method: 'DELETE' });
      if (!res.ok) return;
      bumpImageVersion(activeCam, n);
      refreshPresetBtn(n, activeCam);
    });
    btn.appendChild(clearBtn);

    let handledPointerUp = false;
    function activatePreset() {
      if (editMode) openLabelEditor(n, ovName);
      else recallPreset(n, btn);
    }

    btn.addEventListener('pointerup', (e) => {
      if (e.button != null && e.button !== 0) return;
      handledPointerUp = true;
      activatePreset();
      setTimeout(() => { handledPointerUp = false; }, 0);
    });

    btn.addEventListener('click', (e) => {
      if (handledPointerUp && e.detail !== 0) return;
      activatePreset();
    });

    refreshPresetImage(btn, cam, n);

    return btn;
  }

  // ── Label editor ───────────────────────────────────────────────────────────
  function openLabelEditor(n, nameEl) {
    if (!editMode) return;
    if (nameEl.querySelector('input')) return;
    const lk   = presetKey(state.activeCam, n);
    const prev = state.labels[lk] || '';

    const inp = document.createElement('input');
    inp.type      = 'text';
    inp.className = 'name-input';
    inp.value     = prev;
    inp.maxLength = 24;
    inp.addEventListener('click', e => e.stopPropagation());

    nameEl.innerHTML = '';
    nameEl.appendChild(inp);
    inp.focus(); inp.select();

    function commit() {
      const v = inp.value.trim();
      if (v) state.labels[lk] = v; else delete state.labels[lk];
      schedSave();
      nameEl.innerHTML  = '';
      nameEl.textContent = v;
    }

    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter')  inp.blur();
      if (e.key === 'Escape') { nameEl.innerHTML = ''; nameEl.textContent = prev; }
    });
  }

  // ── Edit mode toggle ───────────────────────────────────────────────────────
  const btnEdit = document.getElementById('btn-edit');
  btnEdit.addEventListener('click', () => {
    editMode = !editMode;
    btnEdit.textContent = editMode ? 'Done' : 'Edit Labels';
    btnEdit.classList.toggle('active', editMode);
    elGrid.querySelectorAll('.preset-btn').forEach(b =>
      b.classList.toggle('edit-mode', editMode)
    );
  });

  // ── Recall ─────────────────────────────────────────────────────────────────
  async function doRecall(preset) {
    const cam = state.cameras[state.activeCam];
    try {
      const res = await fetch('/recall', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          ip: cam.ip, port: cam.port, camera: cam.viscaAddr, preset,
        }),
      });
      return await res.json();
    } catch (e) {
      return { success: false, message: e.message };
    }
  }

  async function recallPreset(n, btn) {
    const cam = state.cameras[state.activeCam];
    if (!cam.ip) {
      setStatus('error', 'Enter the camera IP address first');
      flash(btn, 'fail'); return;
    }
    flash(btn, 'busy');
    setStatus('busy', `Recalling preset ${n}…`, false);
    const data = await doRecall(n);
    if (data.success) {
      flash(btn, 'ok', 900);
      const msg = state.showAtemDebug
        ? `Preset ${n} recalled — ${data.message}`
        : `Preset ${n} recalled`;
      setStatus('success', msg);
    } else {
      flash(btn, 'fail', 1100);
      const msg = state.showAtemDebug
        ? `Preset ${n} failed: ${data.message}`
        : `Preset ${n} failed`;
      setStatus('error', msg);
    }
  }

  function flash(btn, state, ms = 700) {
    btn.classList.remove('state-busy', 'state-ok', 'state-fail');
    btn.classList.add('state-' + state);
    if (state !== 'busy') setTimeout(() => btn.classList.remove('state-' + state), ms);
  }

  // ── Scan all ───────────────────────────────────────────────────────────────
  const btnScan    = document.getElementById('btn-scan');
  const elScanBar  = document.getElementById('scan-bar');
  const elScanFill = document.getElementById('scan-fill');
  const elScanLbl  = document.getElementById('scan-label');

  let scanning   = false;
  let cancelScan = false;

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function hideScanBar() {
    elScanBar.classList.remove('visible');
    elScanFill.style.width = '0%';
  }

  btnScan.addEventListener('click', () => {
    if (scanning) { cancelScan = true; return; }
    scanAll();
  });

  async function scanAll() {
    const cam = state.cameras[state.activeCam];
    if (!cam.ip) { setStatus('error', 'Enter the camera IP address first'); return; }
    const activeCam = state.cameras[state.activeCam];
    const hasServerSource = activeCam.usbDevice || activeCam.streamUrl;
    if (!hasServerSource && !videoStream) {
      setStatus('error', 'Set a USB device, VDO.ninja URL, or browser webcam for this camera'); return;
    }

    scanning = true; cancelScan = false;
    btnScan.textContent = 'Cancel';
    btnScan.classList.add('cancel');
    elScanBar.classList.add('visible');

    const captureErrors = [];

    for (let p = 0; p <= 11; p++) {
      if (cancelScan) break;

      elScanFill.style.width = `${Math.round(p / 12 * 100)}%`;
      elScanLbl.textContent  = `Recalling preset ${p} of 11…`;
      setStatus('busy', `Scanning preset ${p} of 11…`, false);

      const result = await doRecall(p);
      if (!result.success) console.warn(`Recall ${p}:`, result.message);
      if (cancelScan) break;

      const dwell = state.dwellMs;
      const steps = 20;
      for (let i = 0; i < steps; i++) {
        if (cancelScan) break;
        const pct = Math.round((p + (i + 1) / steps) / 12 * 100);
        elScanFill.style.width = pct + '%';
        elScanLbl.textContent  = `Waiting… preset ${p} of 11`;
        await sleep(dwell / steps);
      }
      if (cancelScan) break;

      elScanLbl.textContent = `Capturing preset ${p} of 9…`;
      const ok = await captureFrame(state.activeCam, p);
      if (!ok) {
        captureErrors.push(p);
        console.error(`Capture failed for preset ${p}`);
      } else {
        bumpImageVersion(state.activeCam, p);
        refreshPresetBtn(p, state.activeCam);
      }
    }

    scanning = false;
    btnScan.textContent = 'Scan All Presets';
    btnScan.classList.remove('cancel');
    hideScanBar();
    if (captureErrors.length) {
      setStatus('error', `Capture failed for preset(s): ${captureErrors.join(', ')} — check server console`);
    } else {
      setStatus('success', cancelScan ? 'Scan cancelled' : 'Scan complete');
    }
    cancelScan = false;
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  (async function boot() {
    await loadSettings();
    loadCameraSettings();
    loadGridSettings();
    loadCameraManagement();
    updateToolbarVisibility();
    renderTabs();
    renderGrid();
    applyGridLayout();
    // poll initial ATEM status
    try {
      const r = await fetch('/atem/status');
      if (r.ok) {
        const s = await r.json();
        updateAtemPill(s.connected);
        if (s.preview != null && s.preview !== 0) state.previewSource = s.preview;
        if (s.program != null && s.program !== 0) state.programSource = s.program;
        renderTabs();
        updateAtemDebug();
      }
    } catch (_) {}
    // USB devices from server
    try {
      const devs = await fetch('/api/devices').then(r => r.json());
      devs.forEach(d => {
        const opt = document.createElement('option');
        opt.value       = d.index;
        opt.textContent = d.name;
        elUsbDevice.appendChild(opt);
      });
      const curCam = state.cameras[state.activeCam];
      if (curCam.usbDevice) elUsbDevice.value = curCam.usbDevice;
    } catch (_) {}

    // browser webcam preview (localStorage, device-specific)
    await enumerateWebcams();
    const savedDevice = getWebcamDeviceId();
    if (savedDevice) {
      elWebcam.value = savedDevice;
      startWebcam(savedDevice);
    }
  })();

  window.addEventListener('resize', () => {
    if (state.fillWindow) updateFillGridMetrics();
  });
})();
</script>
</body>
</html>
