# touchOSC PTZ Controller Template v1
# For use with PTZ Preset Control app
#
# Compatible with:
# - touchOSC v1.x (native format)
# - touchOSC v2.x (import and convert via Editor)
#
# Instructions:
# 1. Open this file in touchOSC Editor
# 2. Configure server IP in Network settings (File > Properties > Network)
# 3. Set outgoing port to match PTZ app OSC port (default 9000)
# 4. Export as .tosc if using v2
# 5. Import template into touchOSC app on iOS/Android

# ============================================================================
# CONFIGURATION
# ============================================================================

name = "PTZ Camera Controller"
version = "1.0"
osc_ip_address = "192.168.1.100"
osc_outgoing_port = 9000

# ============================================================================
# LAYOUT: Faders and Controls
# ============================================================================

# ── Title / Status ────────────────────────────────────────────────────────
[label_title]
type = "label"
x = 0.05
y = 0.05
w = 0.9
h = 0.08
address = ""
text = "PTZ Camera Control"
text_color = "ffffff"
background_color = "000000"
alignment = "center"

[label_status]
type = "label"
x = 0.05
y = 0.12
w = 0.9
h = 0.06
address = ""
text = "Server: 192.168.1.100:9000"
text_color = "888888"
background_color = "000000"
alignment = "center"
font_size = 12

# ── Pan Fader (Vertical) ──────────────────────────────────────────────────
[label_pan]
type = "label"
x = 0.08
y = 0.22
w = 0.22
h = 0.05
address = ""
text = "Pan"
text_color = "ffffff"
background_color = "1a1a1a"
alignment = "center"

[fader_pan]
type = "fader"
x = 0.10
y = 0.28
w = 0.18
h = 0.35
address = "/ptz/1/pan"
min = -1.0
max = 1.0
value = 0.0
response = "absolute"
orientation = "vertical"
background_color = "2a2a2a"
foreground_color = "0088ff"

[label_pan_left]
type = "label"
x = 0.08
y = 0.65
w = 0.10
h = 0.04
address = ""
text = "← Left"
text_color = "666666"
background_color = "1a1a1a"
alignment = "center"
font_size = 10

[label_pan_right]
type = "label"
x = 0.22
y = 0.65
w = 0.10
h = 0.04
address = ""
text = "Right →"
text_color = "666666"
background_color = "1a1a1a"
alignment = "center"
font_size = 10

# ── Tilt Fader (Vertical) ─────────────────────────────────────────────────
[label_tilt]
type = "label"
x = 0.38
y = 0.22
w = 0.22
h = 0.05
address = ""
text = "Tilt"
text_color = "ffffff"
background_color = "1a1a1a"
alignment = "center"

[fader_tilt]
type = "fader"
x = 0.40
y = 0.28
w = 0.18
h = 0.35
address = "/ptz/1/tilt"
min = -1.0
max = 1.0
value = 0.0
response = "absolute"
orientation = "vertical"
background_color = "2a2a2a"
foreground_color = "00dd00"

[label_tilt_down]
type = "label"
x = 0.38
y = 0.65
w = 0.10
h = 0.04
address = ""
text = "↓ Down"
text_color = "666666"
background_color = "1a1a1a"
alignment = "center"
font_size = 10

[label_tilt_up]
type = "label"
x = 0.52
y = 0.65
w = 0.08
h = 0.04
address = ""
text = "Up ↑"
text_color = "666666"
background_color = "1a1a1a"
alignment = "center"
font_size = 10

# ── Zoom Fader (Vertical) ─────────────────────────────────────────────────
[label_zoom]
type = "label"
x = 0.68
y = 0.22
w = 0.22
h = 0.05
address = ""
text = "Zoom"
text_color = "ffffff"
background_color = "1a1a1a"
alignment = "center"

[fader_zoom]
type = "fader"
x = 0.70
y = 0.28
w = 0.18
h = 0.35
address = "/ptz/1/zoom"
min = -1.0
max = 1.0
value = 0.0
response = "absolute"
orientation = "vertical"
background_color = "2a2a2a"
foreground_color = "ffaa00"

[label_zoom_out]
type = "label"
x = 0.68
y = 0.65
w = 0.10
h = 0.04
address = ""
text = "🔍 Out"
text_color = "666666"
background_color = "1a1a1a"
alignment = "center"
font_size = 10

[label_zoom_in]
type = "label"
x = 0.82
y = 0.65
w = 0.08
h = 0.04
address = ""
text = "In 🔍"
text_color = "666666"
background_color = "1a1a1a"
alignment = "center"
font_size = 10

# ============================================================================
# CAMERA SELECTOR BUTTONS
# ============================================================================

[label_camera_select]
type = "label"
x = 0.05
y = 0.72
w = 0.9
h = 0.05
address = ""
text = "Select Camera"
text_color = "ffffff"
background_color = "1a1a1a"
alignment = "center"

[button_camera_1]
type = "toggle"
x = 0.10
y = 0.80
w = 0.22
h = 0.08
address = "/ptz/1/select"
text = "Camera 1"
text_color = "000000"
background_color = "0088ff"
background_color_off = "333333"
text_color_off = "ffffff"
value = 1
local_feedback = 1

[button_camera_2]
type = "toggle"
x = 0.39
y = 0.80
w = 0.22
h = 0.08
address = "/ptz/2/select"
text = "Camera 2"
text_color = "000000"
background_color = "0088ff"
background_color_off = "333333"
text_color_off = "ffffff"
value = 0
local_feedback = 1

[button_camera_3]
type = "toggle"
x = 0.68
y = 0.80
w = 0.22
h = 0.08
address = "/ptz/3/select"
text = "Camera 3"
text_color = "000000"
background_color = "0088ff"
background_color_off = "333333"
text_color_off = "ffffff"
value = 0
local_feedback = 1

# ============================================================================
# CONTROL BUTTONS
# ============================================================================

[button_stop]
type = "toggle"
x = 0.15
y = 0.92
w = 0.30
h = 0.06
address = "/ptz/1/stop"
text = "⏹ STOP"
text_color = "ffffff"
background_color = "dd0000"
background_color_off = "dd0000"
text_color_off = "ffffff"
value = 0
local_feedback = 1

[button_help]
type = "label"
x = 0.55
y = 0.92
w = 0.40
h = 0.06
address = ""
text = "ℹ Double-tap faders to reset"
text_color = "666666"
background_color = "1a1a1a"
alignment = "center"
font_size = 11

